<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔐 Layered Architecture E2E Tester</title>
    <style>
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg: #f3f4f6;
        --card-bg: #ffffff;
        --text: #1f2937;
        --text-mute: #6b7280;
        --border: #e5e7eb;
        --success: #10b981;
        --error: #ef4444;
      }
      body {
        font-family:
          'Pretendard',
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.5;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding-top: 3rem;
      }
      .container {
        width: 100%;
        max-width: 800px;
        display: grid;
        gap: 1.5rem;
      }
      .card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      h2 {
        margin-top: 0;
        font-size: 1.25rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.75rem;
        margin-bottom: 1rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-mute);
        margin-bottom: 0.25rem;
      }
      input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      }
      .button-group {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      button {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: var(--primary-hover);
      }
      button.outline {
        background-color: white;
        color: var(--text);
        border: 1px solid var(--border);
      }
      button.outline:hover {
        background-color: var(--bg);
      }

      .terminal {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: 'D2Coding', 'Fira Code', 'Consolas', monospace;
        padding: 1rem;
        border-radius: 8px;
        overflow-x: auto;
        max-height: 400px;
        white-space: pre-wrap;
        word-break: break-all;
        margin-top: 1rem;
      }
      .terminal [data-status='success'] {
        color: #4ade80;
      }
      .terminal [data-status='error'] {
        color: #f87171;
      }
      .terminal [data-status='info'] {
        color: #60a5fa;
      }

      .header-info {
        text-align: center;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-info">
        <h1 style="margin: 0 0 0.5rem 0">Layered Architecture Tester</h1>
        <p style="margin: 0; color: var(--text-mute)">
          API 엔드포인트를 브라우저에서 직접 호출하고 검증합니다.
        </p>
      </div>

      <div class="card">
        <h2>회원가입 / 로그인 (Auth Controller)</h2>
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            value="tester@example.com"
            placeholder="tester@example.com"
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            value="Password123!"
            placeholder="Password123!"
          />
        </div>
        <div class="form-group">
          <label>Name (Optional for Login)</label>
          <input
            type="text"
            id="name"
            value="Test User"
            placeholder="Test User"
          />
        </div>
        <div class="button-group">
          <button id="btn-signup">가입하기 (Sign Up)</button>
          <button id="btn-login" class="outline">로그인 (Login)</button>
        </div>
      </div>

      <div class="card">
        <h2>회원 정보 (Users Controller)</h2>
        <div class="button-group">
          <button id="btn-get-users">전체 유저 조회</button>
          <button id="btn-ping" class="outline">서버 Ping 확인</button>
        </div>
      </div>

      <div class="card">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <h2 style="margin: 0; border: none; padding: 0">
            콘솔 로그 (Console Log)
          </h2>
          <button
            id="btn-clear"
            class="outline"
            style="padding: 0.25rem 0.5rem; font-size: 0.75rem"
          >
            Clear
          </button>
        </div>
        <div class="terminal" id="terminal"></div>
      </div>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
